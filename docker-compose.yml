x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  app:
    build: .
    env_file: .env
    logging: *default-logging
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "127.0.0.1:8000:8000"  # API без auth — только localhost
    networks: [default, sandbox_net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    logging: *default-logging
    command: arq app.worker.WorkerSettings
    networks: [default, sandbox_net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "arq", "--check", "app.worker.WorkerSettings"]
      interval: 60s
      timeout: 30s  # импорт приложения + проверка занимают ~13с
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Изолированный runner: не видит postgres/redis/app (только sandbox_net),
  # read-only ФС, без root, жёсткие лимиты ресурсов
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    logging: *default-logging
    networks: [sandbox_net]
    mem_limit: 768m
    pids_limit: 128
    cpus: 1.0
    read_only: true
    tmpfs:
      - /tmp:size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Шаблон: локальный stdio MCP-сервер как HTTP-sidecar (supergateway).
  # Бот говорит только по Streamable HTTP; stdio-серверы оборачиваются так:
  #   1) раскомментируй сервис, подставь свой `--stdio "…"`;
  #   2) docker compose up -d mcp-filesystem;
  #   3) в чате: /mcp add fs http://mcp-filesystem:8000/mcp
  # Для недоверенных серверов добавь лимиты как у sandbox
  # (mem_limit/pids_limit/cap_drop).
  #
  # mcp-filesystem:
  #   image: supercorp/supergateway:latest
  #   logging: *default-logging
  #   command: >
  #     --stdio "npx -y @modelcontextprotocol/server-filesystem /data"
  #     --outputTransport streamableHttp --port 8000
  #   volumes:
  #     - ./mcp-data:/data
  #   restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gennady}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-gennady}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gennady} -d ${POSTGRES_DB:-gennady}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Суточный pg_dump с ротацией 7 дней
  pg_backup:
    image: pgvector/pgvector:pg16
    env_file: .env
    logging: *default-logging
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        while true; do
          PGPASSWORD=$$POSTGRES_PASSWORD pg_dump -h postgres -U $${POSTGRES_USER:-gennady} $${POSTGRES_DB:-gennady} | gzip > /backups/gennady-$$(date +%F).sql.gz && echo "backup done: gennady-$$(date +%F).sql.gz"
          find /backups -name "*.sql.gz" -mtime +7 -delete
          sleep 86400
        done
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:

networks:
  sandbox_net:
